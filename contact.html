<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - AmitToolsX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <!-- Navigation Bar -->
    <nav class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="text-2xl font-bold text-blue-600 flex items-center">
                        <i class="fas fa-compress-arrows-alt mr-2"></i> AmitToolsX
                    </a>
                </div>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="text-gray-700 hover:text-blue-600 font-medium">Home</a>
                    <a href="about.html" class="text-gray-700 hover:text-blue-600 font-medium">About Me</a>
                    <a href="contact.html" class="text-gray-700 hover:text-blue-600 font-medium border-b-2 border-blue-600">Contact Us</a>
                    <a href="privacy.html" class="text-gray-700 hover:text-blue-600 font-medium">Privacy Policy</a>
                </div>
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-button" class="text-gray-700 focus:outline-none">
                        <i class="fas fa-bars text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-gray-200">
            <a href="index.html" class="block px-4 py-2 text-gray-700 hover:bg-gray-100">Home</a>
            <a href="about.html" class="block px-4 py-2 text-gray-700 hover:bg-gray-100">About Me</a>
            <a href="contact.html" class="block px-4 py-2 text-gray-700 hover:bg-gray-100">Contact Us</a>
            <a href="privacy.html" class="block px-4 py-2 text-gray-700 hover:bg-gray-100">Privacy Policy</a>
        </div>
    </nav>

    <main class="flex-grow container mx-auto px-4 py-12">
        <div class="max-w-xl mx-auto bg-white rounded-2xl shadow-md p-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-6 text-center">Contact Us</h1>
            <p class="text-gray-600 mb-8 text-center">Have a question, feedback, or a tool suggestion? We'd love to hear from you!</p>

            <form class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                    <input type="text" class="w-full border border-gray-300 rounded-md px-4 py-2 focus:ring-blue-500 focus:border-blue-500" placeholder="Your Name">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" class="w-full border border-gray-300 rounded-md px-4 py-2 focus:ring-blue-500 focus:border-blue-500" placeholder="your@email.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Message</label>
                    <textarea rows="4" class="w-full border border-gray-300 rounded-md px-4 py-2 focus:ring-blue-500 focus:border-blue-500" placeholder="How can we help?"></textarea>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors">
                    Send Message
                </button>
            </form>

            <div class="mt-10 pt-8 border-t border-gray-100 flex justify-center space-x-6 text-gray-400">
                <a href="#" class="hover:text-blue-600"><i class="fab fa-twitter text-2xl"></i></a>
                <a href="#" class="hover:text-blue-600"><i class="fab fa-github text-2xl"></i></a>
                <a href="#" class="hover:text-blue-600"><i class="fas fa-envelope text-2xl"></i></a>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 py-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="mb-4 md:mb-0">
                    <a href="index.html" class="text-2xl font-bold text-blue-600">AmitToolsX</a>
                    <p class="text-gray-500 mt-2">Free online tools for everyone.</p>
                </div>
                <div class="flex space-x-6">
                    <a href="about.html" class="text-gray-500 hover:text-blue-600">About</a>
                    <a href="contact.html" class="text-gray-500 hover:text-blue-600">Contact</a>
                    <a href="privacy.html" class="text-gray-500 hover:text-blue-600">Privacy</a>
                </div>
            </div>
            <div class="mt-8 pt-8 border-t border-gray-100 text-center">
                <p class="text-gray-400 text-sm">&copy; 2024 AmitToolsX. All rights reserved.</p>
            </div>
        </div>
    </footer>
    <script>
        document.getElementById('mobile-menu-button').addEventListener('click', () => {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        });
    </script>
</body>
</html>
