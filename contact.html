<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Support | AmitToolsX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .hero-gradient {
            background: radial-gradient(circle at top right, #eff6ff 0%, #ffffff 100%);
        }
    </style>
</head>
<body class="hero-gradient flex flex-col min-h-screen text-gray-900">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 glass-card border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20">
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center space-x-2">
                        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                            <i class="fas fa-expand-arrows-alt text-lg"></i>
                        </div>
                        <span class="text-2xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">
                            AmitToolsX
                        </span>
                    </a>
                </div>
                <div class="hidden md:flex items-center space-x-10 text-sm font-semibold">
                    <a href="index.html" class="text-gray-600 hover:text-blue-600 transition-colors">Home</a>
                    <a href="about.html" class="text-gray-600 hover:text-blue-600 transition-colors">About</a>
                    <a href="contact.html" class="text-blue-600 border-b-2 border-blue-600 pb-1">Contact</a>
                    <a href="privacy.html" class="text-gray-600 hover:text-blue-600 transition-colors">Privacy</a>
                </div>
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-button" class="text-gray-700 p-2 rounded-lg hover:bg-gray-100 transition-colors">
                        <i class="fas fa-bars text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden bg-white/95 backdrop-blur-lg border-t border-gray-100 px-4 py-6 space-y-4">
            <a href="index.html" class="block text-lg font-bold text-gray-700">Home</a>
            <a href="about.html" class="block text-lg font-bold text-gray-700">About</a>
            <a href="contact.html" class="block text-lg font-bold text-blue-600">Contact</a>
            <a href="privacy.html" class="block text-lg font-bold text-gray-700">Privacy</a>
        </div>
    </nav>

    <main class="flex-grow py-20 px-4">
        <div class="max-w-xl mx-auto glass-card rounded-[2.5rem] shadow-2xl p-10 border border-white">
            <h1 class="text-3xl font-black text-gray-900 mb-4 text-center">Get in Touch</h1>
            <p class="text-gray-500 mb-10 text-center font-medium leading-relaxed">Have a question or a tool request? We're here to help Aman Meena's community thrive.</p>

            <form class="space-y-6">
                <div class="space-y-1">
                    <label class="text-xs font-black uppercase tracking-widest text-gray-400 ml-1">Full Name</label>
                    <input type="text" class="w-full bg-white border border-gray-200 rounded-2xl px-6 py-4 font-bold focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all shadow-sm" placeholder="Aman Meena Fan">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-black uppercase tracking-widest text-gray-400 ml-1">Email Address</label>
                    <input type="email" class="w-full bg-white border border-gray-200 rounded-2xl px-6 py-4 font-bold focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all shadow-sm" placeholder="hello@example.com">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-black uppercase tracking-widest text-gray-400 ml-1">Message</label>
                    <textarea rows="4" class="w-full bg-white border border-gray-200 rounded-2xl px-6 py-4 font-bold focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all shadow-sm" placeholder="What's on your mind?"></textarea>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 px-6 rounded-2xl text-lg shadow-xl uppercase tracking-widest transition-all hover:-translate-y-1">
                    Send Message
                </button>
            </form>

            <div class="mt-12 pt-8 border-t border-gray-100 flex justify-center space-x-8">
                <a href="https://www.instagram.com/_technical_01?igsh=MTdydjJkbWl3Y3ppeg==" target="_blank" class="text-gray-400 hover:text-pink-600 transition-colors text-2xl"><i class="fab fa-instagram"></i></a>
                <a href="https://whatsapp.com/channel/0029VaDFCbF9hXFDBUx8fe3E" target="_blank" class="text-gray-400 hover:text-green-600 transition-colors text-2xl"><i class="fab fa-whatsapp"></i></a>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 py-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">&copy; 2024 AmitToolsX. Created with passion by Amit Meena.</p>
        </div>
    </footer>

    <script>
        document.getElementById('mobile-menu-button').addEventListener('click', () => {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        });
    </script>
</body>
</html>
